version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: de_project_2_postgres
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
      POSTGRES_DB: de_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_2:/var/lib/postgresql/data

volumes:
  postgres_data_2:
