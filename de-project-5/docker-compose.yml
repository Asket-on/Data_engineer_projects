version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: de_project_5_postgres
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
      POSTGRES_DB: de_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_5:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U de_user -d de_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  vertica:
    image: vertica/vertica-ce:latest
    container_name: de_project_5_vertica
    ports:
      - "5433:5433"
      - "5444:5444"
    environment:
      - APP_DB_USER=dbadmin
      - APP_DB_PASSWORD=vertica_password
    volumes:
      - vertica_data:/opt/vertica/data
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/vertica/bin/vsql -U dbadmin -c 'SELECT 1;' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6

  minio:
    image: minio/minio:latest
    container_name: de_project_5_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.7.2-python3.11
    container_name: de_project_5_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://de_user:de_password@postgres/de_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    entrypoint: bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password admin
        
        # Import connections from connections.yaml
        airflow connections import /opt/airflow/config/connections.yaml
    volumes:
      - ./config:/opt/airflow/config

  airflow-webserver-scheduler:
    image: apache/airflow:2.7.2-python3.11
    container_name: de_project_5_airflow
    depends_on:
      postgres:
        condition: service_healthy
      vertica:
        condition: service_healthy
      minio:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://de_user:de_password@postgres/de_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - _PIP_ADDITIONAL_REQUIREMENTS=vertica-python boto3 Faker requests tabulate apache-airflow-providers-vertica
    ports:
      - "8080:8080"
    entrypoint: bash
    command:
      - -c
      - |
        # Run scheduler in background and webserver in foreground
        airflow scheduler & exec airflow webserver
    volumes:
      - ./src/dags:/opt/airflow/dags
      - ./config:/opt/airflow/config
      - ./data:/data

volumes:
  postgres_data_5:
  vertica_data:
  minio_data:
